<!DOCTYPE html>
<html lang="nl" translate="no"> 
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Master</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        iframe { 
            width: 100%; height: 100%; border: none; 
            display: none; background: white; 
        }
        #status-screen { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; width: 100%; height: 100%; color: white; text-align: center; 
        }
        h1 { font-size: 5em; margin-bottom: 10px; color: #e74c3c; }
        p { font-size: 2.5em; opacity: 0.8; }
        .loader {
            border: 5px solid #333; border-top: 5px solid #3498db; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="status-screen">
        <h1 id="status-title">Verbinden...</h1>
        <p id="status-desc">Status wordt gecontroleerd.</p>
        <div class="loader" id="loader"></div>
    </div>

    <iframe id="main-frame"></iframe>

    <script>
        // 1. Get the IP from the URL hash (after the # symbol)
        const hashData = window.location.hash.substring(1); 

        // Split the string at the colon into an array and assign to variables
        const [serverIp, port] = hashData.split(':');

        const frame = document.getElementById('main-frame');
        const statusScreen = document.getElementById('status-screen');
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');
        const loader = document.getElementById('loader');

        let currentState = 'INIT'; 
        let checkLoopTimer; 

        if (!serverIp || !port) {
            updateUI('CONFIG_ERROR');
        }

        const SERVER_URL = `http://${serverIp}:${port}/projector`;

        function updateUI(newState) {
            if (currentState === newState) return; 
            currentState = newState;

            if (newState === 'ONLINE') {
                console.log("Connection successful!");
                frame.src = SERVER_URL;
                frame.style.display = "block";
                statusScreen.style.display = "none";
            } else {
                frame.style.display = "none";
                statusScreen.style.display = "flex";
                
                // Clear the iframe src so old content doesn't flash when reconnecting
                if (frame.src !== "") frame.src = ""; 
                
                if (newState === 'ERROR') {
                    statusTitle.innerText = "Netwerkfout";
                    statusDesc.innerText = "De projector kan geen verbinding maken met de server.";
                    loader.style.display = "block"; // Keep loader spinning to show it's retrying
                } else if (newState === 'CONFIG_ERROR') {
                    statusTitle.innerText = "Configuratiefout";
                    statusDesc.innerText = "Geen IP-adres of poortnummer gevonden in de URL (#IP:PORT).";
                    loader.style.display = "none";
                }
            }
        }

        function scheduleNextCheck(delayInMs) {
            clearTimeout(checkLoopTimer);
            checkLoopTimer = setTimeout(checkConnection, delayInMs);
        }

        async function checkConnection() {
            if (!serverIp) return;

            const controller = new AbortController();
            // 2-second timeout for the fetch request
            const fetchTimeout = setTimeout(() => controller.abort(), 2000); 

            try {
                // Try to ping the server. If this succeeds, everything is working.
                await fetch(SERVER_URL, { 
                    mode: 'no-cors', 
                    cache: 'no-store',
                    signal: controller.signal 
                });
                
                clearTimeout(fetchTimeout); 
                updateUI('ONLINE');
                scheduleNextCheck(3000); // Check again in 3 seconds
                
            } catch (error) {
                // Fetch failed (network drop, server down, or timeout). 
                // Treat it all as one generic error.
                clearTimeout(fetchTimeout);
                updateUI('ERROR');
                scheduleNextCheck(3000); // Retry in 3 seconds
            }
        }

        // Start the cycle
        if (serverIp) {
            checkConnection();
        }
    </script>
</body>
</html>
